apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: {{ .Release.Namespace }}
  labels:
    app: etcd
spec:
  serviceName: etcd
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - etcd
            - --name=$(POD_NAME)
            - --data-dir=/var/lib/etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://$(POD_NAME).etcd.{{ .Release.Namespace }}.svc.cluster.local:2379
            - --listen-peer-urls=http://0.0.0.0:2380
            - --initial-advertise-peer-urls=http://$(POD_NAME).etcd.{{ .Release.Namespace }}.svc.cluster.local:2380
            {{- /* build initial-cluster list based on replicaCount */}}
            {{- $parts := list }}
            {{- range $i := until .Values.replicaCount }}
            {{- $parts = append $parts (printf "etcd-%d=http://etcd-%d.etcd.%s.svc.cluster.local:2380" $i $i .Release.Namespace) }}
            {{- end }}
            - --initial-cluster={{ join $parts "," }}
            - --initial-cluster-state=new
            - --initial-cluster-token=multiplayer-infra-etcd
          ports:
            - name: client
              containerPort: {{ .Values.service.clientPort }}
            - name: peer
              containerPort: {{ .Values.service.peerPort }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/etcd
          livenessProbe:
            exec:
              command:
                - etcdctl
                - endpoint
                - health
                - --endpoints=localhost:2379
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - etcdctl
                - endpoint
                - health
                - --endpoints=localhost:2379
            initialDelaySeconds: 5
            periodSeconds: 5

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        storageClassName: {{ .Values.persistence.storageClass }}
