apiVersion: batch/v1
kind: Job
metadata:
  name: rabbitmq-setup
  namespace: {{ .Release.Namespace }}
  labels:
    app: rabbitmq
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              RMQ_HOST="rabbitmq.{{ .Release.Namespace }}.svc.cluster.local"
              until wget -q -O- "http://${RMQ_HOST}:15672" > /dev/null 2>&1; do
                echo "Waiting for RabbitMQ at ${RMQ_HOST}..."
                sleep 5
              done
              echo "RabbitMQ is ready"
      containers:
        - name: setup
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          env:
            - name: RMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: username
            - name: RMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -e
              
              # Wait for management API to actually be ready (not just port open)
               RMQ_HOST="rabbitmq.{{ .Release.Namespace }}.svc.cluster.local"
               for i in $(seq 1 30); do
                 if rabbitmqadmin -H $RMQ_HOST -P 15672 -u $RMQ_USER -p $RMQ_PASS list queues > /dev/null 2>&1; then
                  echo "RabbitMQ management API is ready"
                  break
                fi
                echo "Waiting for management API... attempt $i"
                sleep 2
              done
              
              # Create deadletter exchange (fanout)
               rabbitmqadmin -H $RMQ_HOST -P 15672 -u $RMQ_USER -p $RMQ_PASS declare exchange \
                 name=deadletter.exchange type=fanout durable=true
              
              # Create matchmaking requests queue with dead-letter
               rabbitmqadmin -H $RMQ_HOST -P 15672 -u $RMQ_USER -p $RMQ_PASS declare queue \
                 name=matchmaking.requests durable=true \
                 arguments='{"x-dead-letter-exchange":"deadletter.exchange"}'
              
              # Create matchmaking expired queue (dead-letter destination)
               rabbitmqadmin -H $RMQ_HOST -P 15672 -u $RMQ_USER -p $RMQ_PASS declare queue \
                 name=matchmaking.expired durable=true
              
              # Bind expired queue to deadletter exchange
               rabbitmqadmin -H $RMQ_HOST -P 15672 -u $RMQ_USER -p $RMQ_PASS declare binding \
                 source=deadletter.exchange destination=matchmaking.expired
              
              # Create notifications exchange (topic)
              rabbitmqadmin -u $RMQ_USER -p $RMQ_PASS declare exchange \
                name=notifications.exchange type=topic durable=true
              
              # Create notification queues and bind them
              for event in match.found match.ended match.expired player.joined system.alert; do
                 rabbitmqadmin -H $RMQ_HOST -P 15672 -u $RMQ_USER -p $RMQ_PASS declare queue \
                   name=notifications.$event durable=true
                 rabbitmqadmin -H $RMQ_HOST -P 15672 -u $RMQ_USER -p $RMQ_PASS declare binding \
                   source=notifications.exchange destination=notifications.$event routing_key=$event
              done
              
              echo "RabbitMQ setup complete"
