apiVersion: apps/v1
kind: Deployment
metadata:
  name: replay-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: replay-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: replay-service
  template:
    metadata:
      labels:
        app: replay-service
    spec:
      containers:
        - name: replay-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: replay-service-config
          env:
            - name: COUCHBASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: couchbase-credentials
                  key: password
            - name: MINIO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: password
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
