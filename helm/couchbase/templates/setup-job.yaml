apiVersion: batch/v1
kind: Job
metadata:
  name: couchbase-setup
  namespace: infra
  labels:
    app: couchbase
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-couchbase
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until wget -q -O- http://couchbase.infra.svc.cluster.local:8091/pools > /dev/null 2>&1; do
                echo "Waiting for Couchbase..."
                sleep 5
              done
              echo "Couchbase is ready"
      containers:
        - name: setup
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          env:
            - name: CB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: couchbase-credentials
                  key: username
            - name: CB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: couchbase-credentials
                  key: password
          command:
            - /bin/bash
            - -c
            - |
              # Initialize cluster with reduced memory (dev single-node)
              couchbase-cli cluster-init \
                -c couchbase.infra.svc.cluster.local:8091 \
                --cluster-username $CB_USERNAME \
                --cluster-password $CB_PASSWORD \
                --services data,index,query \
                --cluster-ramsize 1024 \
                --cluster-index-ramsize 256 \
                --index-storage-setting default
              
              # Create buckets per §8.1
              {{- range .Values.buckets }}
              couchbase-cli bucket-create \
                -c couchbase.infra.svc.cluster.local:8091 \
                --username $CB_USERNAME \
                --password $CB_PASSWORD \
                --bucket {{ .name }} \
                --bucket-type {{ .type }} \
                --bucket-ramsize {{ .ramQuotaMB }} \
                --wait
              {{- end }}
              
              echo "Couchbase setup complete"