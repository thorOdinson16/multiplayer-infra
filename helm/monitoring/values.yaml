prometheus:
  image:
    repository: prom/prometheus
    tag: "v3.1.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  service:
    port: 9090

grafana:
  image:
    repository: grafana/grafana
    tag: "11.4.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  service:
    port: 3000
  auth:
    username: admin
    password: "admin"

jaeger:
  image:
    repository: jaegertracing/all-in-one
    tag: "1.64.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  service:
    collectorPort: 4317
    queryPort: 16686

otel:
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.118.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  service:
    otlpPort: 4317
    prometheusPort: 8888