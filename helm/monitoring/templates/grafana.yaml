apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: platform
        orgId: 1
        folder: Multiplayer Platform
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-platform-dashboard
  namespace: monitoring
data:
  platform-overview.json: |
    {
      "uid": "platform-overview",
      "title": "Multiplayer Platform Overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "tags": ["multiplayer", "demo"],
      "time": {"from": "now-30m", "to": "now"},
      "panels": [
        {"type": "stat", "title": "Matchmaking Queue Length", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0}, "targets": [{"expr": "matchmaking_queue_length", "refId": "A"}]},
        {"type": "stat", "title": "RabbitMQ Broker Unavailable", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0}, "targets": [{"expr": "matchmaking_broker_unavailable", "refId": "A"}]},
        {"type": "timeseries", "title": "Telemetry Events", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0}, "targets": [{"expr": "telemetry_events_total", "refId": "A"}]},
        {"type": "timeseries", "title": "OTel Exported Metrics", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}, "targets": [{"expr": "otelcol_exporter_sent_metric_points", "refId": "A"}]},
        {"type": "timeseries", "title": "OTel Exported Spans", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}, "targets": [{"expr": "otelcol_exporter_sent_spans", "refId": "A"}]}
      ],
      "templating": {"list": []},
      "annotations": {"list": []}
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: monitoring
type: Opaque
stringData:
  admin-user: {{ .Values.grafana.auth.username }}
  admin-password: {{ .Values.grafana.auth.password }}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  ports:
    - port: {{ .Values.grafana.service.port }}
  selector:
    app: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          ports:
            - containerPort: {{ .Values.grafana.service.port }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: admin-password
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.grafana.service.port }}
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.grafana.service.port }}
            initialDelaySeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboards
          configMap:
            name: grafana-platform-dashboard
