replicaCount: 1

image:
  repository: auth-service
  tag: "latest"
  pullPolicy: Never

couchbase:
  host: couchbase.infra.svc.cluster.local
  user: admin
  password: "password"

jwt:
  expiryHours: 24

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

service:
  port: 8080
  type: ClusterIP

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70