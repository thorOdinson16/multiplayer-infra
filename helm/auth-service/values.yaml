replicaCount: 1

image:
  repository: auth-service
  tag: "latest"
  pullPolicy: Never

couchbase:
  host: couchbase.infra.svc.cluster.local
  user: admin
  # The couchbase password must be provided via Kubernetes Secret referenced by .Values.secrets.name
  password: ""

jwt:
  # Do NOT store secrets in values.yaml. Provide the JWT secret in a Kubernetes Secret and set .Values.secrets.name accordingly.
  secret: ""
  expiryHours: 24

# Secrets configuration: the chart will reference an existing Kubernetes Secret with this name.
secrets:
  name: auth-service-secrets

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

service:
  port: 8080
  type: ClusterIP

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
