apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: infra
  labels:
    app: nginx
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }
    
    http {
      # Rate limiting zone - 100 req/s per IP per SEC-07
      limit_req_zone $binary_remote_addr zone=ratelimit:10m rate=100r/s;
      
      # DNS resolver for dynamic upstream resolution
      resolver kube-dns.kube-system.svc.cluster.local valid=10s;
      
      # WebSocket upgrade map
      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }
      
      server {
        listen 80;
        
        # Rate limiting applied to all locations
        limit_req zone=ratelimit burst=20 nodelay;
        
        # Auth Service proxy - use variable for runtime DNS resolution
        location /auth/ {
          set $auth_upstream auth-service.game-platform.svc.cluster.local:8080;
          proxy_pass http://$auth_upstream;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Game Room WebSocket proxy
        location /game/ {
          set $game_upstream game-room-server.game-platform.svc.cluster.local:8080;
          proxy_pass http://$game_upstream;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
        }
        
        # Leaderboard API proxy
        location /leaderboard/ {
          set $leaderboard_upstream leaderboard-service.game-platform.svc.cluster.local:8080;
          proxy_pass http://$leaderboard_upstream;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Replay API proxy
        location /replay/ {
          set $replay_upstream replay-service.game-platform.svc.cluster.local:8080;
          proxy_pass http://$replay_upstream;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Reconnect handler proxy
        location /reconnect/ {
          set $reconnect_upstream reconnect-handler.game-platform.svc.cluster.local:8080;
          proxy_pass http://$reconnect_upstream;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Health check endpoint
        location /health {
          return 200 "OK";
          add_header Content-Type text/plain;
        }
      }
    }