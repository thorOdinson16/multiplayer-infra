apiVersion: v1
kind: Service
metadata:
  name: matchmaking-service
  namespace: {{ .Values.namespace }}
  labels:
    app: matchmaking-service
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  selector:
    app: matchmaking-service