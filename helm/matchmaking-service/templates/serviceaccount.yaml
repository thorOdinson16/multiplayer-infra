apiVersion: v1
kind: ServiceAccount
metadata:
  name: matchmaking-service
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: matchmaking-service
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: matchmaking-service
  namespace: {{ .Values.namespace }}
subjects:
  - kind: ServiceAccount
    name: matchmaking-service
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: matchmaking-service
  apiGroup: rbac.authorization.k8s.io
