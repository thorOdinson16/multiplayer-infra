replicaCount: 1

image:
  repository: matchmaking-service
  tag: "latest"
  pullPolicy: Never

rabbitmq:
  url: "amqp://admin:password@rabbitmq.infra.svc.cluster.local:5672/"

etcd:
  endpoint: "etcd.infra.svc.cluster.local:2379"

namespace: game-platform

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

service:
  port: 8080
  type: ClusterIP

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70