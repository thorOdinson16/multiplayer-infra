apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: game-room-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: game-room-server
spec:
  serviceName: game-room-server-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: game-room-server
  template:
    metadata:
      labels:
        app: game-room-server
    spec:
      containers:
        - name: game-room-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.httpPort }}
            - containerPort: {{ .Values.service.raftPort }}
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: RAFT_BIND
              value: "$(POD_IP):7000"
            - name: RAFT_DATA_DIR
              value: {{ .Values.raft.dataDir }}
            - name: COUCHBASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: couchbase-credentials
                  key: password
            - name: ETCD_ENDPOINTS
              valueFrom:
                configMapKeyRef:
                  name: game-room-server-config
                  key: ETCD_ENDPOINTS
          envFrom:
            - configMapRef:
                name: game-room-server-config
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.raft.dataDir }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.httpPort }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.service.httpPort }}
            initialDelaySeconds: 10
            periodSeconds: 5

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        storageClassName: {{ .Values.persistence.storageClass }}
