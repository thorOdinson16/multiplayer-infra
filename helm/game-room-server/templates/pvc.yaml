{{- if eq (int .Values.replicaCount) 1 }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: game-room-server-data
  namespace: game-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  storageClassName: {{ .Values.persistence.storageClass }}
{{- end }}