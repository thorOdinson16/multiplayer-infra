<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplayer Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e; color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .screen { display: none; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }
    .card {
      background: #16213e; padding: 2rem; border-radius: 12px;
      border: 1px solid #0f3460; text-align: center; min-width: 360px;
    }
    h1 { color: #e94560; margin-bottom: 1.5rem; font-size: 1.8rem; }
    h2 { color: #e94560; margin-bottom: 1rem; }
    input {
      display: block; width: 100%; margin: 0.5rem 0; padding: 0.75rem;
      background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px;
      color: #e0e0e0; font-family: inherit; font-size: 1rem;
    }
    input:focus { outline: none; border-color: #e94560; }
    button {
      width: 100%; padding: 0.75rem; margin-top: 1rem;
      background: #0f3460; color: white; border: none; border-radius: 6px;
      cursor: pointer; font-family: inherit; font-size: 1rem;
      transition: background 0.2s;
    }
    button:hover { background: #e94560; }
    button:disabled { background: #333; cursor: not-allowed; }
    canvas {
      border: 1px solid #0f3460; border-radius: 8px;
      background: #0d1b0d;
    }
    #hud {
      display: flex; gap: 2rem; margin-top: 0.75rem;
      background: #16213e; padding: 0.5rem 1.5rem; border-radius: 8px;
      font-size: 0.9rem;
    }
    #hud span { color: #e94560; font-weight: bold; }
    .status { margin-top: 1rem; font-size: 0.85rem; color: #888; }
    .error { color: #e94560; }
    .spinner {
      width: 40px; height: 40px; margin: 1rem auto;
      border: 4px solid #0f3460; border-top: 4px solid #e94560;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="screen-login" class="screen active">
    <div class="card">
      <h1>⚔️ Multiplayer Arena</h1>
      <input type="text" id="username" placeholder="Username" autocomplete="off">
      <input type="password" id="password" placeholder="Password">
      <button id="btn-login">Enter Arena</button>
      <p id="login-status" class="status"></p>
    </div>
  </div>

  <div id="screen-queue" class="screen">
    <div class="card">
      <h2>Finding Match</h2>
      <div class="spinner"></div>
      <p id="queue-status">Searching for players...</p>
      <p id="queue-timer" class="status">00:00</p>
      <button id="btn-cancel-queue">Cancel</button>
    </div>
  </div>

  <div id="screen-game" class="screen">
    <canvas id="game-canvas" width="800" height="600" tabindex="0" style="outline: none;"></canvas>
    <div id="hud">
      <span id="hud-players">Players: 0/8</span>
      <span id="hud-tick">Tick: 0</span>
      <span id="hud-score">Score: 0</span>
    </div>
    <button id="btn-leave" style="margin-top:0.5rem; width:200px;">Leave Match</button>
  </div>

  <script src="src/ws/connection.js"></script>
  <script src="src/game/renderer.js"></script>
  <script src="src/game/input.js"></script>
  <script src="src/index.js"></script>
</body>
</html>
