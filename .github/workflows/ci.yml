name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - matchmaking-service
          - game-room-server
          - reconnect-handler
          - replay-service
          - leaderboard-service
          - analytics-service
          - notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run tests
        run: |
          cd services/${{ matrix.service }}
          go test ./...

  validate-helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Helm charts
        run: |
          for chart in helm/*/; do
            if [ -f "$chart/Chart.yaml" ] && [ -s "$chart/Chart.yaml" ]; then
              helm lint "$chart" || echo "WARNING: $chart lint failed"
            else
              echo "SKIPPING $chart (empty Chart.yaml - not yet implemented)"
            fi
          done

  build-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build Auth Service
        run: |
          cd services/auth-service
          go mod tidy
          go build -o /dev/null ./cmd/main.go
      - name: Build Matchmaking Service
        run: |
          cd services/matchmaking-service
          go mod tidy
          go build -o /dev/null ./cmd/main.go
      - name: Build Game Room Server
        run: |
          cd services/game-room-server
          go mod tidy
          go build -o /dev/null ./cmd/main.go
      - name: Build Reconnect Handler
        run: |
          cd services/reconnect-handler
          go mod tidy
          go build -o /dev/null ./cmd/main.go
      - name: Build Replay Service
        run: |
          cd services/replay-service
          go mod tidy
          go build -o /dev/null ./cmd/main.go
      - name: Build Leaderboard Service
        run: |
          cd services/leaderboard-service
          go mod tidy
          go build -o /dev/null ./cmd/main.go
      - name: Build Analytics Service
        run: |
          cd services/analytics-service
          go mod tidy
          go build -o /dev/null ./cmd/main.go
      - name: Build Notification Service
        run: |
          cd services/notification-service
          go mod tidy
          go build -o /dev/null ./cmd/main.go

  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Dockerfiles exist
        run: |
          test -f services/auth-service/Dockerfile && echo "Auth Dockerfile OK"
          test -f services/matchmaking-service/Dockerfile && echo "Matchmaking Dockerfile OK"
          test -f services/game-room-server/Dockerfile && echo "Game Room Dockerfile OK"
          test -f services/reconnect-handler/Dockerfile && echo "Reconnect Dockerfile OK"
          test -f services/replay-service/Dockerfile && echo "Replay Dockerfile OK"
          test -f services/leaderboard-service/Dockerfile && echo "Leaderboard Dockerfile OK"
          test -f services/analytics-service/Dockerfile && echo "Analytics Dockerfile OK"
          test -f services/notification-service/Dockerfile && echo "Notification Dockerfile OK"

  docker-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - auth-service
          - matchmaking-service
          - game-room-server
          - reconnect-handler
          - replay-service
          - leaderboard-service
          - analytics-service
          - notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
