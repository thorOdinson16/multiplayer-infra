name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Helm charts
        run: |
          for chart in helm/*/; do
            if [ -f "$chart/Chart.yaml" ] && [ -s "$chart/Chart.yaml" ]; then
              helm lint "$chart" || echo "WARNING: $chart lint failed"
            else
              echo "SKIPPING $chart (empty Chart.yaml - not yet implemented)"
            fi
          done

  build-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build Auth Service
        run: |
          cd services/auth-service
          go mod tidy
          go build -o /dev/null ./cmd/main.go
      - name: Build Matchmaking Service
        run: |
          cd services/matchmaking-service
          go mod tidy
          go build -o /dev/null ./cmd/main.go
      - name: Build Game Room Server
        run: |
          cd services/game-room-server
          go mod tidy
          go build -o /dev/null ./cmd/main.go
      - name: Build Reconnect Handler
        run: |
          cd services/reconnect-handler
          go mod tidy
          go build -o /dev/null ./cmd/main.go

  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Dockerfiles exist
        run: |
          test -f services/auth-service/Dockerfile && echo "Auth Dockerfile OK"
          test -f services/matchmaking-service/Dockerfile && echo "Matchmaking Dockerfile OK"
          test -f services/game-room-server/Dockerfile && echo "Game Room Dockerfile OK"
          test -f services/reconnect-handler/Dockerfile && echo "Reconnect Dockerfile OK"